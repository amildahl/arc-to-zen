name: Release Desktop Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform_label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform_label: linux-x64
          - os: windows-2022
            platform_label: windows-x64
          - os: macos-15-intel
            platform_label: macos-x64
          - os: macos-15
            platform_label: macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build desktop artifact
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          PLATFORM_LABEL: ${{ matrix.platform_label }}
        run: |
          python scripts/build_desktop.py \
            --version "$RELEASE_TAG" \
            --platform-label "$PLATFORM_LABEL"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arc-to-zen-${{ matrix.platform_label }}
          path: release-artifacts/*

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --title "arc-to-zen $RELEASE_TAG" \
              --generate-notes
          fi
